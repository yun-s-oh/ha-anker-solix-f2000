name: Validate Integration

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  validate:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "test-scripts/requirements.txt"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f test-scripts/requirements.txt ]; then
            pip install -r test-scripts/requirements.txt
          fi

      - name: Code Style & PEP 8 Checks (flake8)
        run: |
          flake8 custom_components/ --max-line-length=100 || echo "No custom components directory yet"

      - name: Syntax Compilation Check
        run: |
          python -m py_compile custom_components/**/*.py || echo "No python files to compile yet"

      - name: Run Tests
        run: |
          if [ -d tests ]; then
            pytest tests/
          else
            echo "No tests directory yet"
          fi

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HACS Validation Action
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Home Assistant Hassfest Action
        uses: home-assistant/actions/hassfest@master
