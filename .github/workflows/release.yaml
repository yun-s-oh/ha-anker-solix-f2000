name: Automated Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Generate Version & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump_type
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -iq "feat"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "Bump type determined as: minor"
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "Bump type determined as: patch"
          fi

      - name: Create and push Git Tag
        id: create_tag
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ steps.bump_type.outputs.bump }}
          WITH_V: true

      - name: Update manifest.json version
        run: |
          NEW_TAG="${{ steps.create_tag.outputs.new_tag }}"
          NEW_VERSION="${NEW_TAG#v}"
          echo "Updating manifest.json to version $NEW_VERSION"
          jq --arg ver "$NEW_VERSION" '.version = $ver' custom_components/anker_solix_f2000/manifest.json > temp.json && mv temp.json custom_components/anker_solix_f2000/manifest.json

      - name: Commit and push updated manifest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/anker_solix_f2000/manifest.json
          git commit -m "chore(release): update manifest.json to ${{ steps.create_tag.outputs.new_tag }} [skip ci]" && git push origin main || echo "No changes to commit"


      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.create_tag.outputs.new_tag }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
